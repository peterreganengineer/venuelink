<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up as Event Promoter - VenueLink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #0a0a0a;
            --dark-bg: #121212;
            --dark-card: #1a1a1a;
            --blue-dark: #0f172a;
            --blue-mid: #1e3a8a;
            --yellow: #fbbf24;
            --yellow-bright: #fcd34d;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --border: #27272a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        h1, h2, h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
        }

        .signup-container {
            max-width: 500px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, var(--yellow) 0%, var(--yellow-bright) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.05em;
        }

        .signup-card {
            background: var(--dark-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 3rem;
        }

        .signup-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .signup-header h1 {
            font-size: 2rem;
            margin-bottom: 0.75rem;
            letter-spacing: -0.03em;
        }

        .signup-header p {
            color: var(--text-secondary);
            font-size: 1.05rem;
        }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .role-option {
            padding: 1.5rem;
            background: var(--dark-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .role-option:hover {
            border-color: var(--yellow);
            background: rgba(251, 191, 36, 0.05);
        }

        .role-option.active {
            border-color: var(--yellow);
            background: rgba(251, 191, 36, 0.1);
        }

        .role-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }

        .role-label {
            font-weight: 700;
            font-size: 1.1rem;
            font-family: 'Space Grotesk', sans-serif;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .required {
            color: var(--yellow);
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            background: var(--dark-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--yellow);
        }

        .form-group input::placeholder {
            color: #52525b;
        }

        .helper-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-top: 0.2rem;
            accent-color: var(--yellow);
            flex-shrink: 0;
        }

        .checkbox-wrapper label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .checkbox-wrapper label a {
            color: var(--yellow);
            text-decoration: none;
        }

        .checkbox-wrapper label a:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 1.1rem;
            background: var(--yellow);
            color: var(--black);
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Space Grotesk', sans-serif;
        }

        .btn:hover {
            background: var(--yellow-bright);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(251, 191, 36, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            text-align: center;
            margin: 2rem 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            background: var(--dark-card);
            padding: 0 1rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            position: relative;
            z-index: 1;
        }

        .social-login {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem;
            background: var(--dark-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .social-btn:hover {
            border-color: var(--yellow);
            background: rgba(251, 191, 36, 0.05);
        }

        .social-icon {
            font-size: 1.3rem;
        }

        .login-link {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .login-link a {
            color: var(--yellow);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .signup-card {
                padding: 2rem 1.5rem;
            }

            .signup-header h1 {
                font-size: 1.75rem;
            }

            .role-selector {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="logo">
            <div class="logo-text">VenueLink</div>
        </div>

        <div class="signup-card">
            <div class="signup-header">
                <h1>Create Your Account</h1>
                <p>Start booking shows in minutes</p>
            </div>

            <form id="signupForm">
                <div class="role-selector">
                    <div class="role-option active" onclick="selectRole('promoter', this)">
                        <div class="role-icon">🎤</div>
                        <div class="role-label">Event Promoter</div>
                    </div>
                    <div class="role-option" onclick="selectRole('venue', this)">
                        <div class="role-icon">🏛️</div>
                        <div class="role-label">Venue Owner</div>
                    </div>
                </div>

                <input type="hidden" id="role" value="promoter">

                <div class="form-group">
                    <label>Full Name <span class="required">*</span></label>
                    <input type="text" placeholder="John Smith" required>
                </div>

                <div class="form-group">
                    <label>Email Address <span class="required">*</span></label>
                    <input type="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label>Phone Number <span class="required">*</span></label>
                    <input type="tel" placeholder="(555) 123-4567" required>
                    <div class="helper-text">We'll only use this for important booking notifications</div>
                </div>

                <div class="form-group">
                    <label>Password <span class="required">*</span></label>
                    <input type="password" placeholder="At least 8 characters" required>
                </div>

                <div class="checkbox-wrapper">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        I agree to VenueLink's <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn">Create Account</button>
            </form>

            <div class="divider">
                <span>or continue with</span>
            </div>

            <div class="social-login">
                <button class="social-btn">
                    <span class="social-icon">🔵</span>
                    Continue with Google
                </button>
                <button class="social-btn">
                    <span class="social-icon">📘</span>
                    Continue with Facebook
                </button>
            </div>

            <div class="login-link">
                Already have an account? <a href="#">Log in</a>
            </div>
        </div>
    </div>

    <script>
        function selectRole(role, element) {
            // Remove active class from all options
            document.querySelectorAll('.role-option').forEach(opt => {
                opt.classList.remove('active');
            });
            
            // Add active class to selected option
            element.classList.add('active');
            
            // Update hidden input
            document.getElementById('role').value = role;
        }

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Validate form
            const inputs = this.querySelectorAll('input[required]');
            let isValid = true;
            inputs.forEach(input => {
                if (!input.value) {
                    isValid = false;
                    input.style.borderColor = '#ef4444';
                } else {
                    input.style.borderColor = '#27272a';
                }
            });

            if (!isValid) {
                alert('Please fill in all required fields');
                return;
            }

            const role = document.getElementById('role').value;

            // Store user info in sessionStorage
            sessionStorage.setItem('isLoggedIn', 'true');
            sessionStorage.setItem('userRole', role);
            sessionStorage.setItem('userName', this.querySelector('input[type="text"]').value);

            // In real app: send to backend, create account
            alert(`Account created as ${role}! Redirecting to profile builder...`);

            // Redirect to profile builder
            if (role === 'promoter') {
                window.location.href = 'promoter-profile-builder.html';
            } else {
                window.location.href = 'venue-intake-form.html';
            }
        });

        // Pre-select role from landing page if set
        window.addEventListener('load', function() {
            const selectedRole = sessionStorage.getItem('selectedRole');
            if (selectedRole) {
                const roleOptions = document.querySelectorAll('.role-option');
                roleOptions.forEach(opt => opt.classList.remove('active'));

                if (selectedRole === 'venue') {
                    roleOptions[1].classList.add('active');
                    document.getElementById('role').value = 'venue';
                } else {
                    roleOptions[0].classList.add('active');
                    document.getElementById('role').value = 'promoter';
                }

                sessionStorage.removeItem('selectedRole');
            }
        });
    </script>
</body>
</html>
